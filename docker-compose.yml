version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: pdf_extractext_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: pdf_extractext
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf_extractext_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "PDF Extractext"
      APP_VERSION: "0.1.0"
      DEBUG: "false"
      HOST: "0.0.0.0"
      PORT: "8000"
      MONGODB_URL: "mongodb://admin:password@mongodb:27017"
      MONGODB_DATABASE: "pdf_extractext"
      # Set the following for authentication support
      # ENABLE_AUTH: "true"
      # ENABLE_RATE_LIMITING: "true"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
    networks:
      - app_network
    command: python main.py

volumes:
  mongodb_data:
  mongodb_config:

networks:
  app_network:
    driver: bridge
